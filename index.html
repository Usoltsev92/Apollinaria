  const TOTAL_QS = allQuestions.length;
  let answered = new Array(TOTAL_QS).fill(false);
  let userChoice = new Array(TOTAL_QS).fill(null);
  let answeredCount = 0;

  document.getElementById('totalCountSpan').innerText = TOTAL_QS;

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderAllQuestions() {
    const container = document.getElementById('questionsList');
    container.innerHTML = '';
    for (let i = 0; i < allQuestions.length; i++) {
      const q = allQuestions[i];
      const card = document.createElement('div');
      card.className = 'question-card';
      card.setAttribute('data-qidx', i);
      let optsHtml = '';
      q.options.forEach((opt, idx) => {
        optsHtml += `
          <li class="opt-item">
            <label class="opt-label" data-qidx="${i}" data-optidx="${idx}">
              <input type="radio" name="q${i}" class="opt-radio" value="${idx}" ${answered[i] ? 'disabled' : ''}>
              <span class="opt-text">${escapeHtml(opt)}</span>
            </label>
          </li>
        `;
      });
      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Вопрос ${i+1}</span>
        </div>
        <div class="q-text">${escapeHtml(q.text)}</div>
        <ul class="options">${optsHtml}</ul>
        <div class="commentary" id="comment-${i}"><strong>📖 Правильный ответ:</strong> ${escapeHtml(q.options[q.correct])}</div>
      `;
      container.appendChild(card);
      if (answered[i]) {
        highlightCardAnswer(i, userChoice[i], q.correct);
        const commDiv = document.getElementById(`comment-${i}`);
        if (commDiv) commDiv.classList.add('show');
      }
    }
    attachListeners();
    updateProgressBar();
  }

  function highlightCardAnswer(qIdx, selected, correct) {
    const card = document.querySelector(`.question-card[data-qidx="${qIdx}"]`);
    if (!card) return;
    const labels = card.querySelectorAll('.opt-label');
    labels.forEach((label, idx) => {
      label.classList.add('disabled');
      if (idx === correct) label.classList.add('correct-highlight');
      if (idx === selected && idx !== correct) label.classList.add('wrong-highlight');
    });
  }

  function attachListeners() {
    document.querySelectorAll('.opt-label').forEach(label => {
      if (label.getAttribute('data-listener')) return;
      label.setAttribute('data-listener', 'true');
      label.addEventListener('click', function(e) {
        const qIdx = parseInt(this.getAttribute('data-qidx'));
        const optIdx = parseInt(this.getAttribute('data-optidx'));
        if (answered[qIdx]) return;
        const radio = this.querySelector('.opt-radio');
        if (radio) radio.checked = true;
        answered[qIdx] = true;
        userChoice[qIdx] = optIdx;
        const correctIdx = allQuestions[qIdx].correct;
        highlightCardAnswer(qIdx, optIdx, correctIdx);
        const commentDiv = document.getElementById(`comment-${qIdx}`);
        if (commentDiv) commentDiv.classList.add('show');
        answeredCount = answered.filter(v => v === true).length;
        updateProgressBar();
        if (answeredCount === TOTAL_QS) showFinalResults();
      });
    });
  }

  function updateProgressBar() {
    const cnt = answered.filter(v => v === true).length;
    const percent = (cnt / TOTAL_QS) * 100;
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('answeredCountSpan').innerText = cnt;
  }

  function showFinalResults() {
    let correctCount = 0;
    for (let i = 0; i < TOTAL_QS; i++) {
      if (userChoice[i] === allQuestions[i].correct) correctCount++;
    }
    const percent = (correctCount / TOTAL_QS) * 100;
    document.getElementById('finalScore').innerHTML = `${correctCount} / ${TOTAL_QS}`;
    let msg = '';
    if (percent >= 90) msg = '🎉 Отлично! Вы готовы к госэкзамену.';
    else if (percent >= 70) msg = '👍 Хороший результат, но есть над чем поработать.';
    else if (percent >= 50) msg = '📘 Удовлетворительно. Рекомендуется повторить материал.';
    else msg = '📖 Необходимо серьёзно подготовиться. Изучите пояснения к вопросам.';
    document.getElementById('resultMessage').innerText = msg;
    document.getElementById('resultBlock').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function resetEverything() {
    answered.fill(false);
    userChoice.fill(null);
    answeredCount = 0;
    document.getElementById('resultBlock').style.display = 'none';
    renderAllQuestions();
    updateProgressBar();
  }

  document.getElementById('resetTestBtn')?.addEventListener('click', resetEverything);
  renderAllQuestions();
</script>
