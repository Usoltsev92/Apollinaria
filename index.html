<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <title>Обещаю вернуться · Томск</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #1a1e2b 0%, #2d3340 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif;
      padding: 20px;
      margin: 0;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 30% 40%, rgba(180, 200, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(220, 190, 150, 0.1) 0%, transparent 45%);
      pointer-events: none;
    }

    .promise-card {
      background: rgba(20, 25, 35, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 56px;
      padding: 40px 28px 35px;
      box-shadow: 0 40px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.12), inset 0 1px 0 rgba(255,255,255,0.1);
      width: 100%;
      max-width: 720px;
      text-align: center;
      color: #f0eae0;
      transition: transform 0.25s ease;
      position: relative;
      z-index: 2;
    }

    .promise-card:hover {
      transform: scale(1.01);
    }

    .heart-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
      margin-bottom: 5px;
      display: block;
      letter-spacing: 2px;
    }

    h1 {
      font-weight: 350;
      font-size: clamp(1.9rem, 7vw, 2.8rem);
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      color: #f7efe2;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .main-promise {
      font-weight: 600;
      background: linear-gradient(to right, #d9c8a8, #f3e3c9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.2em;
      margin: 5px 0;
    }

    .location-badge {
      background: rgba(210, 230, 255, 0.12);
      backdrop-filter: blur(10px);
      padding: 6px 24px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 1px;
      color: #d4cdb8;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0 5px;
      border: 1px solid rgba(255,255,240,0.25);
    }

    .target-date {
      font-size: 1.15rem;
      font-weight: 350;
      color: #cdc1aa;
      margin: 10px 0 30px;
      background: rgba(0, 0, 0, 0.3);
      display: inline-block;
      padding: 10px 32px;
      border-radius: 60px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .timer-grid {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 15px 8px;
      margin: 25px 0 18px;
    }

    .time-block {
      background: rgba(10, 18, 30, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 34px;
      padding: 18px 10px;
      min-width: 85px;
      flex: 1 1 80px;
      box-shadow: 0 18px 28px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.25);
      border: 1px solid rgba(230, 215, 180, 0.25);
      transition: all 0.2s;
    }

    .time-block:hover {
      background: rgba(25, 35, 50, 0.8);
      border-color: rgba(245, 225, 180, 0.5);
      transform: translateY(-4px);
    }

    .number {
      font-size: clamp(2.6rem, 9vw, 4.8rem);
      font-weight: 700;
      line-height: 1.1;
      color: #fff7ed;
      text-shadow: 0 0 22px #dbb45c, 0 5px 10px black;
      display: block;
      letter-spacing: 1px;
    }

    .label {
      font-size: 0.85rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #c7b595;
      margin-top: 6px;
      display: block;
    }

    .separator {
      font-size: 2.6rem;
      font-weight: 300;
      color: rgba(245, 235, 210, 0.55);
      margin: 0 2px;
      align-self: center;
      display: none;
    }

    @media (min-width: 520px) {
      .separator {
        display: block;
      }
    }

    .message-area {
      margin: 25px 0 10px;
      font-size: 1.15rem;
      font-weight: 400;
      background: rgba(0,0,0,0.35);
      padding: 14px 22px;
      border-radius: 50px;
      display: inline-block;
      color: #e7ddcc;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,220,0.15);
      line-height: 1.5;
      max-width: 90%;
    }

    .love-note {
      margin-top: 18px;
      font-style: italic;
      color: #cdbc9a;
      font-size: 1rem;
      background: rgba(255,255,245,0.05);
      padding: 8px 22px;
      border-radius: 30px;
      display: inline-block;
    }

    .local-time-info {
      margin-top: 25px;
      font-size: 0.9rem;
      color: #a09784;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.35);
      padding: 10px 22px;
      border-radius: 50px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
      backdrop-filter: blur(4px);
    }

    #currentLocalTime {
      font-weight: 600;
      background: rgba(255,255,245,0.12);
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      color: #f2e4cc;
    }

    button {
      background: transparent;
      border: 1px solid rgba(235, 220, 190, 0.45);
      color: #e7d7b8;
      padding: 6px 15px;
      border-radius: 30px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(5px);
      margin-left: 4px;
    }

    button:hover {
      background: rgba(255,255,240,0.18);
      border-color: #f5e6cc;
      color: #fff;
    }

    .small-note {
      font-size: 0.75rem;
      color: #938b78;
      margin-top: 12px;
    }

    .destination {
      font-weight: 500;
      color: #e7cf9e;
    }
  </style>
</head>
<body>
  <div class="promise-card">
    <div class="heart-icon">💖</div>
    <h1>
      <span class="main-promise">ОБЕЩАЮ ВЕРНУТЬСЯ</span>
    </h1>
    <div class="location-badge">
      <span>📍 Томск</span>
      <span style="margin:0 5px;">·</span>
      <span>🏡 любимая женщина</span>
    </div>

    <div class="target-date" id="targetDisplay">20 января</div>

    <!-- Таймер -->
    <div class="timer-grid" id="timerGrid">
      <div class="time-block">
        <span class="number" id="days">00</span>
        <span class="label">дней</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="number" id="hours">00</span>
        <span class="label">часов</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="number" id="minutes">00</span>
        <span class="label">минут</span>
      </div>
      <span class="separator">:</span>
      <div class="time-block">
        <span class="number" id="seconds">00</span>
        <span class="label">секунд</span>
      </div>
    </div>

    <div class="message-area" id="personalMessage">
      Я вернусь в Томск к любимой...
    </div>
    <div class="love-note" id="loveNote">
      ✨ Где мы сможем построить семью ✨
    </div>

    <div class="local-time-info">
      <span>🕰️ <strong>Местное время:</strong></span>
      <span id="currentLocalTime">--:--:--</span>
      <button id="refreshTimeBtn" title="Обновить">↻</button>
    </div>
    <div class="small-note">
      * отсчет по твоему локальному времени · до <span class="destination">20 января</span>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      function getTargetDate() {
        const now = new Date();
        const currentYear = now.getFullYear();
        let target = new Date(currentYear, 0, 20, 0, 0, 0, 0);
        
        if (now >= target) {
          target = new Date(currentYear + 1, 0, 20, 0, 0, 0, 0);
        }
        return target;
      }

      let targetDate = getTargetDate();

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');
      const personalMessageEl = document.getElementById('personalMessage');
      const loveNoteEl = document.getElementById('loveNote');
      const currentLocalTimeEl = document.getElementById('currentLocalTime');
      const targetDisplayEl = document.getElementById('targetDisplay');
      const refreshBtn = document.getElementById('refreshTimeBtn');

      const pad = (num) => String(num).padStart(2, '0');

      function updateLocalTimeDisplay() {
        const now = new Date();
        const hours = pad(now.getHours());
        const minutes = pad(now.getMinutes());
        const seconds = pad(now.getSeconds());
        currentLocalTimeEl.textContent = `${hours}:${minutes}:${seconds}`;
        return now;
      }

      function formatTargetDate(date) {
        const year = date.getFullYear();
        const month = pad(date.getMonth() + 1);
        const day = pad(date.getDate());
        return `${day}.${month}.${year}`;
      }

      function updateTargetDisplay() {
        targetDisplayEl.textContent = formatTargetDate(targetDate);
      }

      function calculateTimeLeft(now, target) {
        const difference = target - now;
        if (difference <= 0) {
          return {
            total: 0,
            days: 0,
            hours: 0,
            minutes: 0,
            seconds: 0,
            expired: true
          };
        }
        const totalSeconds = Math.floor(difference / 1000);
        const days = Math.floor(totalSeconds / (60 * 60 * 24));
        const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
        const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
        const seconds = totalSeconds % 60;
        return { total: difference, days, hours, minutes, seconds, expired: false };
      }

      function getPersonalMessage(timeData) {
        if (timeData.expired) {
          return "💫 20 января настало! Время вернуться в Томск к любимой женщине.";
        }
        const days = timeData.days;
        const hours = timeData.hours;
        
        if (days > 60) {
          return `Я считаю дни до возвращения в Томск. Осталось ${days} дней — и мы решим, где построим семью.`;
        } else if (days > 14) {
          return `Скоро я вернусь в Томск к любимой. ${days} дней до нашей встречи и общего плана.`;
        } else if (days > 1) {
          return `Уже совсем близко! Через ${days} дн. я буду в Томске, и мы выберем место для семьи.`;
        } else if (days === 1) {
          return `Завтра! Я возвращаюсь в Томск. Мы вместе решим, где начать новую главу.`;
        } else if (hours >= 1) {
          return `Сегодня! Через ${hours} ч. я буду рядом. Томск и любимая — всё, что нужно.`;
        } else if (timeData.minutes >= 1) {
          return `Остались минуты... Я возвращаюсь к тебе. Наше общее будущее начинается.`;
        } else {
          return `Секунды до встречи. Томск, любимая, семья — всё это сейчас.`;
        }
      }

      function updateDisplay(timeData) {
        if (timeData.expired) {
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
        } else {
          daysEl.textContent = pad(timeData.days);
          hoursEl.textContent = pad(timeData.hours);
          minutesEl.textContent = pad(timeData.minutes);
          secondsEl.textContent = pad(timeData.seconds);
        }
        
        personalMessageEl.textContent = getPersonalMessage(timeData);
        
        if (timeData.expired) {
          loveNoteEl.innerHTML = '🏡❤️ Томск и наша семья — теперь навсегда ❤️🏡';
        } else if (timeData.days < 7) {
          loveNoteEl.innerHTML = '🌹 Скоро обниму тебя. Наша семья — моя главная мечта.';
        } else {
          loveNoteEl.innerHTML = '✨ Где мы сможем построить семью ✨';
        }
      }

      function tick() {
        const now = updateLocalTimeDisplay();
        
        const currentYear = now.getFullYear();
        if (now >= targetDate) {
          const newTarget = new Date(currentYear + 1, 0, 20, 0, 0, 0, 0);
          if (targetDate.getTime() !== newTarget.getTime()) {
            targetDate = newTarget;
            updateTargetDisplay();
          }
        } else {
          if (targetDate.getFullYear() < currentYear) {
            let freshTarget = new Date(currentYear, 0, 20, 0, 0, 0, 0);
            if (now >= freshTarget) {
              freshTarget = new Date(currentYear + 1, 0, 20, 0, 0, 0, 0);
            }
            targetDate = freshTarget;
            updateTargetDisplay();
          }
        }
        
        const timeData = calculateTimeLeft(now, targetDate);
        updateDisplay(timeData);
      }

      function manualRefresh() {
        targetDate = getTargetDate();
        updateTargetDisplay();
        tick();
      }

      refreshBtn.addEventListener('click', (e) => {
        e.preventDefault();
        manualRefresh();
      });

      function init() {
        targetDate = getTargetDate();
        updateTargetDisplay();
        tick();
        window.timerInterval = setInterval(tick, 1000);
      }

      window.addEventListener('beforeunload', () => {
        if (window.timerInterval) clearInterval(window.timerInterval);
      });

      setInterval(() => {
        const now = new Date();
        if (now >= targetDate) {
          const newTarget = getTargetDate();
          if (targetDate.getTime() !== newTarget.getTime()) {
            targetDate = newTarget;
            updateTargetDisplay();
            tick();
          }
        }
      }, 60000);

      init();
    })();
  </script>
</body>
</html>
